<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
</head>

<body>

{% if user %}

    <h1>Profile</h1>

    <h3>Your data:</h3>

    <p>
        First name: {{ user[0] }}
    </p>

    <p>
        Last name: {{ user[1] }}
    </p>

    <p>
        Email: {{ user[2] }}
    </p>

    <hr>

    <h3>Change your data</h3>

    <form action="/update_profile" method="POST">

        <input
            type="text"
            name="first_name"
            placeholder="New first name"
        >

        <br><br>

        <input
            type="text"
            name="last_name"
            placeholder="New last name"
        >

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="New email"
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="New password"
        >

        <br><br>

        <form action="/change_profile" method="POST">

            <button type="submit">
                Submit changes
            </button>
    
        </form>

    </form>

    <br>

    <form action="/logout" method="POST">

        <button type="submit">
            Logout
        </button>

    </form>

    <br>

    <form action="/delete_account" method="POST">

        <button type="submit">
            Delete account
        </button>

    </form>

    <br><br><br>

    <form action="/rules" method="GET">

        <button type="submit">
            rules
        </button>

    </form>

{% if user[3] %}

    <br>

    <form action="/admin_panel" method="GET">

        <button type="submit">
            Admin panel
        </button>

    </form>

{% endif %}

{% else %}

    <h1>Profile not found</h1>

    <p>
        You are not logged in.
    </p>

    <a href="/login">
        Login
    </a>

    <br><br>

    <a href="/register">
        Register
    </a>

{% endif %}

</body>
</html>
